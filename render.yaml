services:
  - type: web
    name: mini-erp-api
    env: node
    rootDir: backend
    buildCommand: pnpm install && pnpm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
    autoDeploy: true
